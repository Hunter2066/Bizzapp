<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iStore - Premium Mobile Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-white p-4 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-2xl font-black text-orange-500 italic">iStore</h1>
                <button onclick="sortByPrice()" class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold">
                    Sort by Price ↑
                </button>
            </div>
            <input type="text" id="searchInput" onkeyup="filterPhones()" placeholder="Search iPhone 7 to 17..." 
            class="w-full border-none bg-gray-100 rounded-lg px-4 py-2 focus:ring-2 focus:ring-orange-400 outline-none text-sm">
        </div>
    </nav>

    <section class="p-3 container mx-auto">
        <div id="phoneGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
            
            <div class="phone-card bg-white rounded-lg shadow-sm overflow-hidden flex flex-col" data-name="iphone 17 pro max" data-price="1199">
                <img src="https://images.unsplash.com/photo-1632649162859-400192e2764f?w=400" class="w-full h-40 object-cover">
                <div class="p-2 flex flex-col flex-grow">
                    <h4 class="text-xs font-medium text-gray-800 line-clamp-2">Apple iPhone 17 Pro Max - Titanium Gold</h4>
                    <span class="text-orange-500 font-bold text-lg mt-1">$1199</span>
                    <button onclick="sendOrder('iPhone 17 Pro Max')" class="mt-2 bg-orange-500 text-white w-full py-2 rounded text-xs font-bold uppercase">Buy Now</button>
                </div>
            </div>

            <div class="phone-card bg-white rounded-lg shadow-sm overflow-hidden flex flex-col" data-name="iphone 15" data-price="799">
                <img src="https://images.unsplash.com/photo-1696446701796-da61225697cc?w=400" class="w-full h-40 object-cover">
                <div class="p-2 flex flex-col flex-grow">
                    <h4 class="text-xs font-medium text-gray-800 line-clamp-2">Apple iPhone 15 - Pink Edition</h4>
                    <span class="text-orange-500 font-bold text-lg mt-1">$799</span>
                    <button onclick="sendOrder('iPhone 15')" class="mt-2 bg-orange-500 text-white w-full py-2 rounded text-xs font-bold uppercase">Buy Now</button>
                </div>
            </div>

            <div class="phone-card bg-white rounded-lg shadow-sm overflow-hidden flex flex-col" data-name="iphone 13" data-price="550">
                <img src="https://images.unsplash.com/photo-1633113089631-6456cccaadad?w=400" class="w-full h-40 object-cover">
                <div class="p-2 flex flex-col flex-grow">
                    <h4 class="text-xs font-medium text-gray-800 line-clamp-2">Apple iPhone 13 - Midnight Blue</h4>
                    <span class="text-orange-500 font-bold text-lg mt-1">$550</span>
                    <button onclick="sendOrder('iPhone 13')" class="mt-2 bg-orange-500 text-white w-full py-2 rounded text-xs font-bold uppercase">Buy Now</button>
                </div>
            </div>

            <div class="phone-card bg-white rounded-lg shadow-sm overflow-hidden flex flex-col" data-name="iphone x" data-price="250">
                <img src="https://images.unsplash.com/photo-1510557880182-3d4d3cba3f9e?w=400" class="w-full h-40 object-cover">
                <div class="p-2 flex flex-col flex-grow">
                    <h4 class="text-xs font-medium text-gray-800 line-clamp-2">Apple iPhone X - Silver 64GB</h4>
                    <span class="text-orange-500 font-bold text-lg mt-1">$250</span>
                    <button onclick="sendOrder('iPhone X')" class="mt-2 bg-orange-500 text-white w-full py-2 rounded text-xs font-bold uppercase">Buy Now</button>
                </div>
            </div>

            <div class="phone-card bg-white rounded-lg shadow-sm overflow-hidden flex flex-col" data-name="iphone 7" data-price="120">
                <img src="https://images.unsplash.com/photo-1556656793-062ff9878273?w=400" class="w-full h-40 object-cover">
                <div class="p-2 flex flex-col flex-grow">
                    <h4 class="text-xs font-medium text-gray-800 line-clamp-2">Apple iPhone 7 - Jet Black Classic</h4>
                    <span class="text-orange-500 font-bold text-lg mt-1">$120</span>
                    <button onclick="sendOrder('iPhone 7')" class="mt-2 bg-orange-500 text-white w-full py-2 rounded text-xs font-bold uppercase">Buy Now</button>
                </div>
            </div>

        </div>
    </section>

    <script>
        function filterPhones() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.phone-card');
            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                card.style.display = name.includes(input) ? "flex" : "none";
            });
        }

        function sortByPrice() {
            const grid = document.getElementById('phoneGrid');
            const cards = Array.from(grid.getElementsByClassName('phone-card'));
            cards.sort((a, b) => a.getAttribute('data-price') - b.getAttribute('data-price'));
            cards.forEach(card => grid.appendChild(card));
        }

        function sendOrder(model) {
            const myPhone = "YOUR_NUMBER_HERE"; // Change to your real number
            const text = `Hi! I want to order the ${model} from your iStore.`;
            window.open(`https://wa.me/${myPhone}?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
