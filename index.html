<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Business App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-white p-6 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">My Business</h1>
        </div>
    </nav>

    <header class="py-16 bg-blue-600 text-white text-center px-4">
        <h2 class="text-4xl font-bold mb-4">Welcome to Our App</h2>
        <p class="text-lg">We provide the best solutions for your needs.</p>
    </header>

    <section class="py-12 px-4">
        <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg">
            <h3 class="text-xl font-bold mb-6 text-center">Contact Us</h3>
            
            <form action="https://formspree.io/f/your_id" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Name</label>
                    <input type="text" name="name" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" name="email" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Message</label>
                    <textarea name="message" rows="4" class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                    Send Inquiry
                </button>
            </form>
            
        </div>
    </section>

    <footer class="py-8 text-center text-gray-500">
        &copy; 2026 Your Business Name
    </footer>

</body>
</html>
