<form action="https://formspree.io/f/your_id" method="POST" class="space-y-4">
    <div>
        <label class="block text-sm font-medium text-gray-700">Name</label>
        <input type="text" name="name" required class="w-full mt-1 p-2 border border-gray-300 rounded-md">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" name="email" required class="w-full mt-1 p-2 border border-gray-300 rounded-md">
    </div>
    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md font-bold hover:bg-blue-700 transition">Send Inquiry</button>
</form>
